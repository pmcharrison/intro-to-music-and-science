on:
  push:
     branches:
       - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

name: renderbook

jobs:
  bookdown:
    name: Render-Book
    runs-on: ubuntu-24.04
    container:
      image: rocker/r2u:noble
    env:
      RETICULATE_PYTHON: /usr/bin/python3
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libcurl4-openssl-dev libmagick++-dev libharfbuzz-dev libfribidi-dev sox python3 python3-venv
      - name: Install R dependencies
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'install.packages(c("renv", "remotes"))'
          Rscript -e 'deps <- unique(na.omit(renv::dependencies()$Package)); deps <- setdiff(deps, rownames(installed.packages())); if (length(deps)) install.packages(deps)'
          Rscript -e 'remotes::install_github(c("pmcharrison/abcR", "pmcharrison/hrep", "pmcharrison/specdec"), upgrade = "never", dependencies = TRUE)'
      - name: Preflight Python and reticulate
        run: |
          python3 --version
          Rscript -e 'reticulate::py_config()'
      - name: Render Book
        run: Rscript -e 'bookdown::render_book("index.Rmd")'
      - uses: actions/upload-artifact@v4
        with:
          name: _book
          path: _book/
  
# Need to first create an empty gh-pages branch
# see https://pkgdown.r-lib.org/reference/deploy_site_github.html
# and also add secrets for a GH_PAT and EMAIL to the repository
# gh-action from Cecilapp/GitHub-Pages-deploy
  checkout-and-deploy:
   runs-on: ubuntu-24.04
   needs: bookdown
   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
   steps:
     - name: Checkout
       uses: actions/checkout@v4
     - name: Download artifact
       uses: actions/download-artifact@v4
       with:
         # Artifact name
         name: _book # optional
         # Destination path
         path: _book # optional
     - name: Deploy to GitHub Pages
       uses: pmcharrison/GitHub-Pages-deploy@v3
       with:
         email: ${{ secrets.EMAIL }}
         build_dir: _book
       env:            # must be a verified email
         GITHUB_TOKEN: ${{ secrets.GH_PAT }} # https://github.com/settings/tokens
    
 
